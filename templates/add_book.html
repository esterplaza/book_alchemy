<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
  </head>
  <body>

  <form action="/add_book" method="POST">
  <label for="isbn">ISBN:</label>
  <input type="text" id="isbn" name="isbn" maxlength="17" required title="ISBN cannot be longer than 17 characters."><br><br>
  <label for="title">Title:</label>
  <input type="text" id="title" name="title" maxlength="100" required title="The title cannot be longer than 100 characters."><br><br>
  <label for="publication_year">Publication year:</label>
  <input type="number" id="publication_year" name="publication_year" min="500" max="3000" required title="Please enter a four-digit year (e.g. 2024) "><br><br>
  <label for="author">Select the Author:</label>
  <select id="author" name="author_id">
      <option value=""> Unknown Author </option>
    {% for author in authors %}
      <option value="{{ author.id }}">{{ author.name }}</option>
    {% endfor %}
  </select>
  <br><br>
  <input type="submit" value="Add Book">
  </form>
  {% if success %}
    <p>{{ success }}</p>
  {% endif %}
  </body>
</html>
